<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Procesar Archivo Plano – Cuentas Bancarias</title>
    <link rel="stylesheet" href="../css/global.css">
</head>
<body>

    <button class="btn-home" onclick="goToHome()">« Página Inicio</button>

    <div class="container">
        <h1>INSCRIPCIÓN DE CUENTAS BANCARIAS</h1>

        <!-- DRAG & DROP -->
        <div class="upload-section" id="dropZone">
            <p style="font-size:18px;">📂 Arrastra tu archivo aquí</p>
            <p style="font-size:13px; color:#777;">o haz clic para seleccionar</p><br>

            <label class="file-label">
                Seleccionar archivo
                <input type="file" id="fileInput" accept=".txt, .xlsx, .xls, .ods">
            </label>

            <div class="file-name" id="fileName">No hay archivos seleccionados</div>
        </div>

        <div class="buttons">
            <button id="btnProcesar" class="btn-success" disabled>Procesar</button>
            <button id="btnCancelar" class="btn-danger" disabled>Cancelar</button>
        </div>

        <div id="errorMessage" style="display:none; text-align:center; margin-bottom:15px; padding:10px; border-radius:6px; font-weight:bold;"></div>

        <div class="buttons" id="downloadButtons" style="display:none;">
            <button id="btnExcel" class="btn-primary" disabled>📊 Descargar Excel</button>
            <button id="btnSiesa" class="btn-primary" disabled>📋 Descargar Formato Siesa</button>
            <button id="btnPlano" class="btn-primary" disabled>📄 Descargar Archivo Plano</button>
        </div>

        <h2>Datos Procesados</h2>

        <div class="table-container">
            <table id="dataTable">
                <thead id="dataHead"></thead>
                <tbody id="dataBody"></tbody>
            </table>
        </div>
    </div>

    <footer>
        <div class="footer-content">
            <p>Copyright © | Popayán 2025</p>
            <p>Tesorería Comfacauca</p>
            <p class="signature">Desarrollo: Wilmar Andrés Gómez</p>
        </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.2/xlsx.full.min.js"></script>
    <script src="app.js"></script>

</body>
</html>
